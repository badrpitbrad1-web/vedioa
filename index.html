<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2028</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        .year {
            font-size: 180px;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.1);
            letter-spacing: -10px;
            line-height: 1;
            margin-bottom: 60px;
            user-select: none;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }

        .msg:nth-child(1) { color: #fff; animation-delay: 0.3s; }
        .msg:nth-child(2) { color: rgba(255,255,255,0.6); animation-delay: 0.6s; }
        .msg:nth-child(3) { color: rgba(255,255,255,0.4); animation-delay: 0.9s; }
        .msg:nth-child(4) { color: rgba(255,255,255,0.3); animation-delay: 1.2s; }
        .msg:nth-child(5) { color: rgba(255,255,255,0.2); animation-delay: 1.5s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .line {
            width: 1px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            margin: 40px auto;
            animation: grow 1s forwards;
            transform-origin: top;
            transform: scaleY(0);
        }

        @keyframes grow {
            to { transform: scaleY(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="year">2028</div>
        <div class="line"></div>
        <div class="messages">
            <div class="msg">Are you ready for 2028?</div>
            <div class="msg">Êtes-vous prêts pour 2028 ?</div>
            <div class="msg">هل أنتم مستعدون لعام 2028؟</div>
            <div class="msg">¿Estás listo para 2028?</div>
            <div class="msg">Sind Sie bereit für 2028?</div>
        </div>
    </div>
</body>
</html>
